name: Update README index

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**/*.md"
      - "backend/**/*.md"
      - "scripts/update_readme_index.py"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README note index
        run: python scripts/update_readme_index.py

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "README index is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README note index"
          git push
